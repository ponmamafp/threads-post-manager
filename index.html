<script type="text/babel">
const { useState } = React;

const INITIAL_POSTS = [
  { id: 1, title: "固定費を放置してる人、年間18万円損してる", hook: "スマホ代、保険料、サブスク。「まぁいいか」で毎月1万5千円、静かに消えてませんか？年間にすると18万円。気づかないうちに確実にお金を失ってる仕組み、知ってますか？", hookCandidates: [], body: "固定費って、一度見直すと効果がずっと続くんです。\n\nうちの場合：\n・スマホ → 格安SIMで月5,000円減\n・保険 → 不要な特約外して月3,000円減\n・サブスク → 使ってない3つ解約で月2,000円減\n\n合計：月1万円、年間12万円。\n\n「面倒くさい」で放置してる1日を使うだけで、来年の家計が変わります。\n\nこういう「一回やれば終わり」の家計術、他にもプロフィールにまとめてます。", cat: "固定費", status: "done", scheduleDate: "2026-03-27", scheduleTime: "", priority: 20, source: "", usedTemplate: "", valueCheck: "", createdDate: "2026-03-25" },
  { id: 2, title: "電気代の明細見た？去年より月3,200円高くなってた", hook: "電気代の請求書を見て、思わず二度見しました。去年の同じ月と比べて月3,200円も上がってて、年間にすると約4万円の出費増になるんです。暖房をガンガン使ったわけでもないのに。この金額がどこから生まれてるのか気になって、明細を調べてみたら、意外なことがわかったんですが", hookCandidates: [], body: "家計管理をしていると「小さな変化」に気づくことがあります。\n\n電気代の値上げもそのひとつ。去年3月と今年3月を比べると、月3,200円の差。年間にすると4万円です。\n\n「たった3,200円？」と思うかもしれませんが、これが家計に与える影響って案外大きいんですよ。お子さんの習い事1ヶ月分、洋服数枚分、貯金に回せる金額として考えると違って見えませんか。\n\nこういう値上げって一気に来るわけじゃなくて、徐々に進むから気づきにくいんです。電気・ガス・水道・通信費・保険。気がつくと月の固定費が1万円以上増えてることもあります。\n\nだからこそ、3ヶ月ごと、半年ごとに「あの時といくら変わった？」を確認する習慣が大切なんだと思います。変化に気づけば、対策も立てやすいですから。\n\n見直しのきっかけって案外、こういう請求書の数字との出会いなんですよね。", cat: "節約", status: "draft", scheduleDate: "", scheduleTime: "", priority: 9, source: "", usedTemplate: "", valueCheck: "", createdDate: "2026-03-25" },
  { id: 3, title: "ポイ活がんばってたのに全部消えた", hook: "ポイ活を3ヶ月間、かなり本気で頑張ってみました。毎朝欠かさずアプリをチェックして、外出先ではレシートをこまめに撮影して、寝る前にはコツコツとゲームもこなして。それで3ヶ月後に獲得ポイントを計算してみたら、あまりの結果に思わず笑ってしまったんですが", hookCandidates: [], body: "ポイ活の成果報告です。\n\n朝起きてアプリをチェック、外出先でもレシート撮影、隙間時間でゲーム、帰宅後にポイント獲得。毎日の習慣として組み込んで3ヶ月。\n\n獲得ポイントを計算したら...2,400円。\n\n月800円です。\n\n「え、これだけ？」という感じですよね。実は私も同じ気持ちでした。\n\nでも、ここからが大事なんです。その同じ3ヶ月間に、家計管理の中で「月額制を年払いに変更」「保険料を見直し」「通信費を下げた」だけで、毎月8,000円の固定費削減ができたんです。\n\nポイ活は「努力感」があるから続きやすいんですけど、実は効率で言うと、固定費見直しのほうが圧倒的に大きいんですよ。\n\nポイ活を否定するわけじゃなくて、「時間対効果」を考えると、3ヶ月かけてやるなら固定費見直しに時間をかけたほうが、疲れも少なくて成果も大きいってお話です。\n\n両方やるのもいいですけど、優先順位つけるなら固定費からですね。", cat: "ポイ活", status: "draft", scheduleDate: "", scheduleTime: "", priority: 16, source: "", usedTemplate: "", valueCheck: "", createdDate: "2026-03-25" },
  { id: 4, title: "高校就学支援金の申請を忘れずに", hook: "この春から高校生になるお子さんがいるご家庭へ、大事なお知らせがあります。高等学校就学支援金の申請をしないと、3年間で最大12万〜40万円を受け取り損ねることになります。しかもこの制度は自動では適用されないので、自分から動かないといけないんですが", hookCandidates: [], body: "4月の入学式シーズン。制服や教材の準備で忙しいご家庭も多いと思います。\n\nその中で、つい見落としやすいのが「高等学校就学支援金」の申請です。\n\nこの制度、実は自動で給付されるわけではなくて「申請手続きが必須」なんですよ。\n\n支援金の額は世帯年収によって変わります。年収590万円未満の世帯なら月9,900円（年間118,800円）、年収590万円以上910万円未満なら月4,950円（年間59,400円）が目安です。申請しないままだと、この金額を受け取れないまま高校生活を過ごすことになります。\n\n3年間の合計で考えると、12万円から40万円の差が出てくるんです。\n\n申請タイミングは入学式前後。学校からの案内を待つのではなく、親側で「いつ申請するのか」を確認しておくことをお勧めします。必要書類は世帯年収を証明するものなど、比較的シンプルです。\n\nお子さんの教育費って、こういった「もらえるものの申請手続き」がいくつか隠れてるんですよね。制度を知ってるか知らないかで、支払う金額が大きく変わってきます。", cat: "支援金", status: "draft", scheduleDate: "", scheduleTime: "", priority: 2, source: "", usedTemplate: "", valueCheck: "", createdDate: "2026-03-25" },
  { id: 5, title: "子ども・子育て支援金（4月から天引開始・詳細）", hook: "2026年4月のお給料の明細、届いたらよく確認してみてください。新しい天引き項目が1つ増えているはずです。子ども・子育て支援金として毎月500〜600円程度。金額だけ見ると小さいんですが、今後の段階的な引き上げが既に予定されていて、知っておかないとまずいことになるんですが", hookCandidates: [], body: "4月から給与から新しく天引きされるものがあります。それが「子ども・子育て支援金」です。\n\n月額500〜600円程度の負担。「そのくらいなら大丈夫」と思う方も多いかもしれません。\n\nただし、ここが大事な部分なんです。この支援金は段階的に引き上げられる予定になっています。数年後には月1,000円を超える可能性も指摘されているんですよ。\n\n年間で見ると600円×12ヶ月＝7,200円。そこまで大きくないように見えますけど、同じタイミングで他の税金や保険料も調整されていることって多いんです。気づかないうちに、月の手取りが少しずつ減っていく感覚を持つご家庭も増えてくると思います。\n\n「子どもの支援に使われるなら」と納得する気持ちもありますが、家計管理の視点では「今後の引き上げに備えて、今から家計の調整を始めておく」が正解です。\n\n毎月の給与明細をきちんと確認して、「あ、新しく引かれてる」に気づく習慣。それが、家計が急に圧迫される事態を防いでくれるんですよね。", cat: "支援金", status: "draft", scheduleDate: "", scheduleTime: "", priority: 8, source: "", usedTemplate: "", valueCheck: "", createdDate: "2026-03-25" },
  { id: 6, title: "こどもNISAのリアルな活用ガイド", hook: "先輩ママに「児童手当は、そのまま生活費に使っちゃダメだからね」って言われたんです。「月1万円をこどもNISAで18年間積み立てたら、いくらになると思う？」って聞かれて、私が答えた金額と実際の金額の差があまりに大きくて、正直かなり驚いたんですが", hookCandidates: [], body: "先輩ママとの家計談義で印象的だったセリフがあります。\n\n「児童手当って、そのまま使っちゃうと『あれ、もらってたっけ？』って感じで終わっちゃうんだよ」\n\n当時、私は児童手当を生活費に充てていたので、ドキッとしました。\n\nその先輩は児童手当をそっくりこどもNISAに積み立ててるんだって。月1万円、生まれてから18歳になるまでの18年間。何の工夫もなく、淡々と積み立てるだけ。\n\n「で、18年でいくらになったと思う？」\n\n計算結果は約349万円でした。年利5%で複利計算した場合です。\n\nその時、私は初めて気づきました。「お金って、時間をかけると働く」ってことを。\n\n今、その先輩の話を実践している親御さんは、数年後の成果を感じられています。児童手当という「もともとある仕組み」を活用するだけで、子どもの未来が変わるんですよね。", cat: "NISA", status: "draft", scheduleDate: "", scheduleTime: "", priority: 12, source: "", usedTemplate: "", valueCheck: "", createdDate: "2026-03-25" },
  { id: 7, title: "家計が勝手に回る仕組み", hook: "「家計簿が続かないんです」って悩んでるママさん、本当によく聞くんですが、実は続かなくていいんです。家計が勝手に回る仕組みさえ一度作ってしまえば、毎日の記録も月末の振り返りもいらなくなる。その仕組みがたった3つのステップで完成するって知ってましたか", hookCandidates: [], body: "家計が勝手に回る仕組み。その中身はシンプルです。\n\nまず「先取り貯金」。給料が入ったら、生活費に回す前に貯金額を別口座に移す。これだけで、貯金は「最初から存在しないお金」扱いになります。貯金を意識する必要がないんですよ。\n\n次が「口座分け」。生活費用、固定費用、予備費用で別々の口座を持つ。それぞれの役割が決まってるので、お金の流れが単純になります。\n\nそしてここからが大事な部分なんですが、毎週1回、30秒だけかけて「口座の残高を確認する」。多くの人は家計簿で細かく記録しようとするから続かないんです。でも、残高を見るだけなら30秒で終わります。\n\n「あ、固定費用口座がいつもより減ってる」に気づくと、無駄な支出も自動的に見えてきます。家計簿には「記録の手間」があるけど、残高確認には「手間」がないんですよ。\n\nその月の生活費がいくらだったか、細かい記録は別にいらないんです。来月のやりくりができるなら、それで十分です。\n\n仕組みさえ作れば、管理って実は楽になるんですよね。", cat: "家計管理", status: "draft", scheduleDate: "", scheduleTime: "", priority: 11, source: "", usedTemplate: "", valueCheck: "", createdDate: "2026-03-25" },
  { id: 8, title: "入学費用のリアルな金額集計", hook: "入学費用のリアルな数字って、進路によって全然違うんです。ネットでよく見かける「平均は○○万円」を信じてると、準備が足りなくなるか、必要以上に不安になるかのどちらかになりがち。実際に「我が家の場合はいくら？」で計算し直してみたら、全く違う金字が出てきたんですが", hookCandidates: [], body: "入学費用の「平均」って、ネットでよく見かけます。\n\nでも、実際には学年や進学先で大きく差が出るんです。\n\n幼稚園から小学校。制服がない場合で平均25万円程度。でも、制服がある園から入学する子なら、新しい制服購入で15万円上乗せになることも。\n\n小学校から中学校。部活動に必要な用具があれば、スポーツ系で10万円超えることもあります。\n\n中学から高校。受験に向けた塾代が既に支払われてるから、逆に入学費用そのものは少ないかもしれません。\n\n高校から大学。ここが一番差が出るところです。通学範囲の国立大学と、遠方の私立大学では、初年度納入金で100万円以上の差が生まれます。\n\n大事なのは「我が家の場合、この進路だといくら必要か」を逆算することなんです。子どもが生まれた時点で、進路のシミュレーションをしておくと、貯蓄計画もぐんと立てやすくなりますよ。", cat: "教育費", status: "draft", scheduleDate: "", scheduleTime: "", priority: 15, source: "", usedTemplate: "", valueCheck: "", createdDate: "2026-03-25" },
  { id: 9, title: "教育費贈与制度（希少性ナッジ）", hook: "祖父母からの教育資金を最大1,500万円まで非課税で受け取れる制度があるんですが、実はこれが2026年3月末で終了するって知ってましたか。申請しないまま期限が過ぎてしまうと、同じ金額を贈与しても数百万円規模の税金がかかる可能性があるんですが", hookCandidates: [], body: "「教育資金贈与制度」という制度があります。\n\n祖父母からお孫さんへの教育資金を、非課税で贈与できるというものです。上限は1,500万円。この金額全額が非課税です。\n\nただし、ここが肝心なところです。この制度は2026年3月31日で終了します。\n\n「知ってれば申請したのに」という状況を避けるために、祖父母さんがいるご家庭は、今すぐ確認が必要です。金融機関への申請手続きは、書類作成に時間がかかることもあります。\n\n適用期限が迫ってることを知らないままだと、何百万円という税負担が発生することになります。金額が金額だけに、後から気づいても遅いんです。\n\n教育費に関する制度って、申請期限が決まってるものが多いんですよね。事前に知ってるか知らないかで、家計に大きな差が生まれる。それが、お金に関する知識の威力なんだと思います。", cat: "教育費", status: "draft", scheduleDate: "", scheduleTime: "", priority: 7, source: "", usedTemplate: "", valueCheck: "", createdDate: "2026-03-25" },
  { id: 10, title: "保険見直し（損失回避ナッジ）", hook: "「今、毎月いくら保険料を払ってますか？」って聞かれて、すぐに金額が出てこない人は、ほぼ確実に払いすぎてます。月5,000円の無駄があるとしたら年間で6万円、10年で60万円。子どもの教育費1年分くらいの金額が、気づかないうちに消えてるかもしれません", hookCandidates: [], body: "「今、月いくら保険料を払ってますか？」という質問に、すぐに答えられる人は実は少ないんです。\n\n給与から天引きされてるから、金額を意識したことがない。そういう家庭がほとんどです。\n\n保険見直しの時に詳しく聞いていくと、「20年前に加入したままで、内容をほぼ覚えてない」という方も多いんですよ。\n\n20年の間に、人生のステージは大きく変わってるはずです。独身時代の保障内容と、家族が増えた今の必要性は全く違うんですが、保険も加入したままというわけです。\n\n多くの場合、見直してみると「実はいらない保障」や「安い商品に変更できる部分」が見つかります。月5,000円の削減なんて珍しくない。年間6万円。10年だと60万円です。\n\n保険って、一度加入したら放置になりやすいんですが、実は定期的な「確認」がすごく大事なんですよ。\n\n「月いくら払ってる？」に答えられるようになると、家計管理の第一歩が始まります。", cat: "保険", status: "draft", scheduleDate: "", scheduleTime: "", priority: 13, source: "", usedTemplate: "", valueCheck: "", createdDate: "2026-03-25" },
  { id: 11, title: "教育費「なんとなく不安」投稿", hook: "お子さん1人の教育費、幼稚園から大学まで全部公立でも約850万円かかるって知ってましたか。途中で私立が入ると2,000万円を超えることも珍しくないんです。3人のお子さんがいるなら2,550万円。この数字を初めて見た時、家計の優先順位が一気に変わったんですが", hookCandidates: [], body: "教育費の総額を初めて計算する時、多くのママさんが驚きます。\n\nお子さん1人につき、公立の場合でおよそ850万円。これは幼稚園から高校まで、国公立大学進学を想定した数字です。\n\n私立幼稚園や私立小学校を選ぶと、その段階で100万円単位の差が出ます。さらに私立中学・高校と進めば、合計で2,000万円を超えることも珍しくありません。\n\n850万円という数字を聞くと、「え、そんなにかかるの？」と感じるかもしれませんが、実際には月々の支出として細切れになってるから、意識されにくいんですよ。\n\n大事なのは「合計がいくら」という数字を知ることではなくて、「進路によって、いつ、いくら必要になるのか」を見える化することなんです。\n\n高校入学の時に300万円必要。大学入学時に400万円。そう具体的に分かると、いつから、いくら、貯蓄すべきかが見えてきます。\n\n3人のお子さんがいるご家庭なら2,550万円。その数字に向き合うことで、家計の優先順位も変わってくるんですよね。", cat: "教育費", status: "draft", scheduleDate: "", scheduleTime: "", priority: 14, source: "", usedTemplate: "", valueCheck: "", createdDate: "2026-03-25" },
  { id: 1001, title: "子ども・子育て支援金（4月開始）", hook: "4月の給与明細をしっかり確認してください。新しく天引きが始まる「子ども・子育て支援金」は月500〜600円。少額に見えますが、段階的に引き上げが予定されていて、数年後には月1,000円を超える可能性も指摘されてるんですよね。毎月の家計、大丈夫ですか", hookCandidates: [], body: "今年の4月から新たに給与天引きされるようになる「子ども・子育て支援金」。月額で500～600円程度と聞くと「そんなに少ないなら大丈夫」と思いがちです。ですが、ここが落とし穴。\n\n政府の資料によると、将来的には段階的に引き上げられる計画があります。現在の月500～600円が、3年後5年後にどうなるか。不確定な部分もありますが、引き上げの可能性は十分高いんです。\n\n家計管理をしてると気づくのは、小さな負担の積み重ねが後々効いてくるということ。子どもたちのための制度だから悪いものではないのですが、私たちの手取りが減ることに変わりはありません。\n\n今のうちに、家計の見直しポイントを把握しておくことが大切です。保険料の最適化、サブスク整理、通信費の見直しなど。月500～600円浮かせられたら、この負担の帳尻が合いますよね。\n\n政策は予告なく変わることもあります。その時に慌てないよう、今から「家計の弾力性」を高めておくことをお勧めします。アイコンから他の家計管理の投稿ものぞいてみてくださいね。", cat: "制度改正・家計管理", status: "draft", scheduleDate: "", scheduleTime: "", priority: 1, source: "ライター", usedTemplate: "数字型", valueCheck: "①悩み言語化②原因説明③すぐ使える解決策⑦体験談", createdDate: "2026-03-28" },
  { id: 1002, title: "火災保険大幅値上げ対策", hook: "母が「昔は火災保険なんて気にならないくらい安かったのよ」って言ってた意味が、今になってようやくわかりました。自然災害の増加で火災保険料が20年ぶりの大幅値上げなんです。でも保険会社を比較して切り替えるだけで、年間6万円浮いた家庭が結構あるんですよ", hookCandidates: [], body: "私の母が「昔は火災保険なんて安かったのよ」と言ってたのが、今よくわかります。火災保険の大幅値上げが全業界で進行中。気をつけないと家計が相当圧迫されます。\n\n背景には自然災害の増加と保険金支払いの増加があります。保険会社は経営が厳しくなってるんです。\n\n現実的なアクションとしては、複数の保険会社を比較することが一番効果的です。同じ補償内容なのに会社を切り替えるだけで、年間6万円浮いたというご家庭は珍しくありません。1年で6万円、10年だと60万円。この差は無視できませんよね。\n\n特に火災保険の契約更新時期が来てる人は要注意。更新予定通りに進めると、知らず知らずのうちに高い保険料を払い続けることになります。\n\n今が見直しのチャンスです。めんどくさいと後回しにすると、複数年分の高い保険料を支払う羽目に。アイコンから家計最適化の他の投稿もぜひ見てみてくださいね。", cat: "固定費削減", status: "draft", scheduleDate: "", scheduleTime: "", priority: 6, source: "ライター", usedTemplate: "衝撃事実型", valueCheck: "①悩み言語化②原因説明③すぐ使える解決策④NG例改善例⑦体験談", createdDate: "2026-03-28" },
  { id: 1003, title: "家計管理の実体験", hook: "給料は増えてるのに、なぜかお金がない。その理由、ほとんどのママが同じパターンに陥ってます。上がった給料の使い道を意識してないと、確実に増えたぶんだけ出ていくんです。", hookCandidates: [], body: "ほんと、このあるあるですよね。給料が上がった時、「あ、これで貯金増やせる」って思いませんか？でも実際は、お金の流れって変わってない。むしろ減ってる場合もある。\n\nなぜか。それは「固定費」がいつの間にか膨れてるから。子どもが生まれると、保険・通信・習い事。気づいたら毎月5万円ぐらい増えてるんです。給料上がっても吸収されちゃう。\n\n私も子ども3人になった時、家計簿つけても意味ないなって気づきました。毎日の買い物を減らすより、毎月自動で引かれてる金額を見直すほうが、よっぽど効く。\n\n実際にやったのは、①全ての保険・サブスク・通信費をリスト化（驚くほど多い）、②必要/不必要を判定、③本当に必要な分だけ残す。これで月3万円浮きました。\n\nそしたら、給料増加分が貯金に回るようになった。固定費を見直さないと、給料いくらあっても足りないんです。子育て中だからこそ、優先順位つけることが大事。", cat: "家計管理・固定費", status: "done", scheduleDate: "2026-03-28", scheduleTime: "", priority: 21, source: "ライター", usedTemplate: "体験談型", valueCheck: "①悩み言語化②原因説明③すぐ使える解決策⑦体験談⑧再現性", createdDate: "2026-03-28" },
  { id: 1004, title: "妊婦支援給付（5万円）レア制度", hook: "妊婦さんが受け取れる給付金5万円、この制度を知っていますか。自治体から自動で案内が届くわけではなくて、自分から申請しないと1円ももらえないんです。知らないまま出産してしまう人が本当に多くて、産後に気づいた時には申請期限が過ぎてることもあって", hookCandidates: [], body: "妊娠中に自治体から給付される5万円。新しい制度だから、情報が行き渡ってない部分が大きいんですよね。多くのママから「えっ、そんな制度あったの」という声を聞きます。\n\n仕組みとしては、妊婦さんが健診で使える補助券や給付金が各地域で用意されてるんです。でも役所から自動的に案内が来るわけではなく、こちらから申請手続きをする必要があります。\n\nつまり知ってる人は5万円ゲット。知らない人は0円。同じママなのに、この差があるのはもったいないですよね。\n\n実際に相談を受けてると「出産後に『あの給付金を申請し忘れた』と気づいた」という方も。出産直後は手続きどころではありませんから、知ってる人は妊娠中に申請を済ませちゃいます。\n\n次に妊娠予定のある方がいたら、ぜひこの情報を教えてあげてください。知らないまま出産するママさんを減らすことが、みんなの家計を守ることにつながります。他の家計情報もプロフィールからチェックしてみてくださいね。", cat: "制度・妊婦支援", status: "draft", scheduleDate: "", scheduleTime: "", priority: 4, source: "ライター", usedTemplate: "制度・改正型", valueCheck: "①悩み言語化②原因説明⑤初心者向けの言葉⑥小さな気づき⑨常識の逆転", createdDate: "2026-03-28" },
  { id: 1005, title: "節約の落とし穴", hook: "節約してるのに、なぜか貯金が減ってる。そんな人は、実は「削っちゃダメな支出」を切ってる可能性が高いです。我慢することと、家計を整えることは、全く別の話なんです。", hookCandidates: [], body: "これ、本当によく見かけます。毎日のコーヒーを我慢して、コンビニ弁当を避けて…なのに、貯金が増えない。むしろ減ってるって人。\n\nなぜだと思います？それは「細かい節約」で満足して、「大きな固定費」を見落としてるから。月500円のコーヒーを我慢しても、月8000円の保険が無駄なら、差し引き7500円損ですよ。\n\n節約あるあるの落とし穴：\n・毎日の買い物は減らす←時間かかる割に効果薄\n・保険・通信・サブスクはそのまま←無駄が大きい\n・結果：疲れるだけで貯金増えない\n\n正しくは逆です。\n・毎日の買い物は気にしない（神経すり減る）\n・保険・通信・サブスクをガッツリ見直す（効果大）\n・手間も少なく、効果も大きい\n\nうちもそう。子ども3人だから、毎日の買い物で1000円減らすより、保険を見直して月5000円減らすほうが、家計が楽になった。\n\n細かい節約で疲れてる人は、ぜひ「毎月自動で引かれてる金額」をリスト化してみてください。そこに答えがあります。", cat: "家計管理・節約", status: "done", scheduleDate: "2026-03-28", scheduleTime: "", priority: 22, source: "ライター", usedTemplate: "あるある型＆逆説型", valueCheck: "①悩み言語化②原因説明③すぐ使える解決策④NG例改善例⑦体験談", createdDate: "2026-03-28" },
  { id: 1006, title: "新学期準備費を抑える方法", hook: "新学期の準備費用、子ども3人分を合計したら6万円もかかってました。文房具に体操着に上履きにカバン。でも「本当に今すぐ新しく買う必要があるもの」と「去年のが使えるもの」を一つずつ仕分けしてリスト化したら、あら不思議、半分の3万円まで減ったんです。何が削れたと思いますか", hookCandidates: [], body: "新学期が近づくと、文房具、体操着、上履き、靴、カバンなどなど。あれこれ買い足す時期ですよね。子ども1人あたり2万円×3人で6万円。家計管理の視点では「大きな支出」です。\n\nここで試してほしいのが「何に使うお金か」を仕分けることです。\n\nまず最初に確認するのが「本当に新しく買う必要があるか」という視点。前年度の備品でまだ使えるものはないか、サイズアウトしたものは何か。この段階で不要な買い替えを避けられます。\n\n次に「質と量のバランス」を見直します。100均で揃える方が安い場合と、ちょっと良いものを買う方が長持ちして結果的に安い場合。目的別に仕分けるんです。\n\nさらに「時間をかけて揃えるもの」と「学期開始までに急いで揃えるもの」を分ける。急ぎのものに割く予算を絞れば、その分を計画的に買える商品に回せます。\n\n実際、このリスト化を通じて「あ、これ前に買ったまま使ってなかった」という発見も多いんです。\n\n丁寧に家計を見つめると、無理なく削減できる部分が見えてきます。他の家計管理の工夫もアイコンからご覧くださいね。", cat: "子育て家計・新学期", status: "draft", scheduleDate: "", scheduleTime: "", priority: 3, source: "ライター", usedTemplate: "リスト型", valueCheck: "①悩み言語化②原因説明③すぐ使える解決策④NG例改善例⑦体験談", createdDate: "2026-03-28" },
  { id: 1007, title: "固定費見直しの本質", hook: "貯金したいなら、給料の手取り額ではなく「固定費」を徹底的に見るべきです。手取りがいくらであろうと、固定費が高いと貯金は増えません。ここに気づくと、家計の景色が変わります。", hookCandidates: [], body: "これ、ほんと大事なので言い切ります。貯金を増やしたいなら、給料を上げることより、固定費を下げることのほうが、はるかに簡単で効果的です。\n\nなぜか。給料を5万円上げるのは難しい。昇進・転職・副業…いろいろ頑張らないといけない。でも固定費を5万円削るのは、保険と通信費と不要なサブスクを見直すだけ。3日で終わる。\n\nしかも給料が上がれば税金も上がるけど、固定費を削れば100%手に入る。効率が全然違う。\n\n私が見てきた家計で、毎月10万円以上貯金できてる人の共通点は、給料が多いんじゃなく、固定費が少ないこと。手取り25万円でも、月8万円貯金してる人もいます。なぜ？固定費が月5万円だから。\n\n固定費を把握すること。これが全ての始まり。保険・通信費・サブスク・ジムの会費…毎月自動で引かれてる金額を全部リスト化する。そしたら「あ、これ必要ない」ってやつが絶対に見つかる。\n\nそれを削ったら、貯金は勝手に増えます。給料アップを待つより、ずっと早い。子育て中だからこそ、この事実を知ってください。", cat: "家計管理・固定費", status: "done", scheduleDate: "2026-03-27", scheduleTime: "", priority: 23, source: "ライター", usedTemplate: "断言型", valueCheck: "①悩み言語化②原因説明③すぐ使える解決策⑦体験談⑨常識の逆転", createdDate: "2026-03-28" },
  { id: 1008, title: "GW旅行費節約", hook: "GWの家族旅行、4人分の最初の見積もりは30万円でした。宿泊費、移動費、食事代にアクティビティ。でも予約サイトの使い分けと出発時間帯の工夫、クレカのポイント還元をフル活用したら12万円まで下がったんです。18万円も浮いた具体的なやり方、気になりませんか", hookCandidates: [], body: "ゴールデンウイークの家族旅行。子どもたちのために「いい思い出を」と計画を立てると、あっという間に予算が膨れ上がりますよね。宿泊費、食事代、移動費、アクティビティ。最初の見積もりは30万円でした。\n\nここからが家計管理の出番です。\n\n最初のステップは「予約サイトの使い分け」。同じホテルでも、楽天トラベル、じゃらん、公式サイトで価格が違うんです。さらにクーポンやポイント還元の条件も異なります。複数サイトを比較して、実は全然違う金額で予約できることが多いんですよ。\n\n次に「時間帯を柔軟に」という選択肢。ハイシーズンの昼間フライトではなく、早朝便や夜間便を選ぶだけで、数万円浮きます。\n\nそしてクレジットカードのポイント還元をフル活用。旅費全体を高還元カードで決済すれば、その分が返ってきます。家族4人の旅費なら数千円規模のポイント、あなどれません。\n\n30万円から12万円。つまり18万円の削減です。このお金が別の家計目標に使えたら、人生変わりますよね。", cat: "季節ネタ", status: "draft", scheduleDate: "", scheduleTime: "", priority: 5, source: "ライターB", usedTemplate: "ビフォーアフター型", valueCheck: "①③④⑤⑦⑧⑩", createdDate: "2026-03-28" },
  { id: 1009, title: "固定資産税支払い最適化", hook: "固定資産税の納付書が届いたら、そのまま銀行振込で払ってませんか。実はnanaco払いやクレジットカード納税を使い分けるだけで、毎年数千円分のポイントが貯まるんです。10年続けると数万円の差になる。同じ金額を払うなら、手元に返ってくる方法を選びたいですよね", hookCandidates: [], body: "毎年春に来る固定資産税の納税書。そのまま銀行窓口で振り込んでいませんか。実は払い方を工夫するだけで、ポイントが貯まる方法があります。\n\n固定資産税は金額が大きい支出。自治体によって年間5万円から10万円以上になることもあります。\n\nまず第一は「nanaco払い」。コンビニでnanacoにチャージしてから納税すると、クレジットカードのポイント還元の対象になります。\n\n次に「クレジットカード納税」。自治体によってはクレジットカード納税に対応してます。還元率の良いカードを使えば、その分がポイントとして返ってきます。\n\nそして「複数回に分割納付」。固定資産税は分割納税が可能です。一度に大きな額をチャージするより、複数回に分けた方がお得なことも。\n\n年間で数千円のポイント獲得も珍しくありません。10年間続けたら数万円。同じお金を払うなら、手元に何か返ってくる方がいいですよね。\n\n固定資産税は毎年確実に来る支出だからこそ、工夫の甲斐がある部分です。アイコンから他の家計工夫もご覧くださいね。", cat: "制度", status: "draft", scheduleDate: "", scheduleTime: "", priority: 10, source: "ライターB", usedTemplate: "問いかけ型", valueCheck: "①②③④⑤⑦⑨", createdDate: "2026-03-28" },
  { id: 1010, title: "電気代値上げ対策（春の活用）", hook: "FPの先輩に「電力会社の見直しをするなら春が絶対ベスト」って教わった理由を聞いたら、なるほどと思いました。冬の暖房も夏の冷房もない時期だから、各電力会社の料金の差がはっきり見えるんです。実際に切り替えて年間1.5万円浮かせた家庭の話なんですが", hookCandidates: [], body: "電力自由化から数年経ちますが、未だに電力会社の見直しをしてない家庭、けっこう多いんですよね。FPの先輩が「春が狙い目」と言ってた理由は、とてもシンプルです。\n\n冬の暖房需要が減り、夏の冷房需要はまだ先。つまり春の電気使用量は年間で一番少ない時期です。この時期に各電力会社の料金プランを見比べると、差がはっきり見える。だから最適な選択ができるんですよ。\n\n実際の数字で見てみましょう。年間1.5万円浮いたというご家庭は、けっして珍しくありません。月々1,200円の節約ですから、子どもの教育費に回したり、貯蓄を増やしたり。家計の自由度が変わります。\n\n電力会社の比較で気をつけたいのは「基本料金」と「従量料金」の両方を見ること。安さだけでなく「我が家の電気使用パターンに合ってるか」を確認する必要があります。\n\n電気代は毎月の支出。12ヶ月×1,200円＝14,400円。5年続けたら72,000円。この差を「小さい」と考えるか「大きい」と考えるかで、家計管理の結果が変わりますよ。", cat: "季節ネタ", status: "draft", scheduleDate: "", scheduleTime: "", priority: 5, source: "ライターB", usedTemplate: "簡潔型", valueCheck: "①②③⑤⑥⑧", createdDate: "2026-03-28" },
  { id: 1011, title: "月2万浮かせる方法", hook: "「月2万浮いた」その秘密は、あるサービスをやめたからです。でもそれは節約ではなく、実は別の工夫があったんです。家計を増やす人と減らす人の決定的な違い、ここにあります。", hookCandidates: ["月2万浮かせる最短ルート、意外な〇〇だった", "我慢ゼロで月2万浮く生活、これで続く理由", "毎月2万が勝手に貯まる仕組み、作り方3ステップ", "「節約できない」あなたが月2万浮かせるたった1つのコツ", "月2万浮かせた人共通点は〇〇だった", "我慢しない家計管理で月2万浮く、その正体", "年24万貯金増、実はシンプルです", "月2万浮かせた選択肢、あなたは知ってましたか？", "家計診断で発見した月2万の無駄、その対策法"], body: "毎月2万を浮かせるには「やめる」が最大の近道。最初は「頑張り系」の節約をしてたけど続かない。苦しいから。そこで視点を変えました。「削る」ではなく「仕組み化」。\n\n簡単に再現できる3ステップ：\n①保険を見直す（月5000円削減例）\n②サブスク棚卸し（月3000円削減例）\n③給与天引き設定（月7000円自動貯金）\n\nこの3つで月15000円。残り5000円は日々の〇〇をやめるだけ。もう「我慢」とは無縁です。", cat: "家計管理", status: "done", scheduleDate: "2026-03-27", scheduleTime: "", priority: 24, source: "リライト", usedTemplate: "Stitch型7ブロック", valueCheck: "①②③④⑦", createdDate: "2026-03-28" },
  { id: 1012, title: "教育費計画", hook: "教育費の総額を初めて計算した時、多くのママが一瞬固まります。公立一貫で進んでも約1,000万円。途中で私立が混ざると2,000万円を超えることもある。でもこの数字は「全額を今すぐ用意しなきゃ」という意味ではないんです。大事なのは、いつ・いくら必要かという時間軸で考えることなんですが", hookCandidates: ["教育費〇〇円の現実、いま親世代が目をそらしている理由", "「教育費3大落とし穴」知らない親が陥る失敗パターン", "子どもの選択肢を広げるために、今親ができることは", "教育費の準備、「後で考えよう」が最も危険な理由", "年収別・教育費の現実的プラン、我が家の事例", "教育費不足が子どもに与える影響、想像以上に大きい", "教育資金の準備、いつから始めるべきか", "親の家計管理が直結する子どもの将来選択肢", "教育費で後悔しない親の共通点、それは〇〇"], body: "教育費について相談を受ける時、必ず最初に出す数字があります。公立一貫で進んだ場合の生涯教育費。それが約1,000万円。聞いたママたちの顔が、一瞬こわばります。\n\nそして「もし途中で私立が入ったら」という話をすると、2,000万円を超えることもあります。\n\nでもここが重要なポイントです。この1,000万円や2,000万円という数字は「決定ではなく、選択肢の材料」だということ。多くのママが「その金額を全部用意しなきゃダメ」と思い込んでしまいます。\n\n実際のところ、教育費の計画は「どの段階でどれくらい必要か」を時間軸で考えることが大切です。幼稚園から高校までは年間50万円、大学は年間200万円。段階ごとに必要額が違うんです。\n\nそして重要な認識としては「今から向き合うほど、選択肢が増える」ということです。子どもが小学生のうちからシミュレーションしておけば、貯蓄額、保険の工夫、制度の活用、働き方の調整。様々な手段が検討できるんですよ。\n\n大切なのは「その数字に圧倒されるのではなく、今から何ができるかを考える」こと。小さな工夫の積み重ねが、子どもたちの選択肢を広げるんですよね。", cat: "教育費", status: "draft", scheduleDate: "", scheduleTime: "", priority: 17, source: "リライト", usedTemplate: "Problem-Agitate-Solve型", valueCheck: "①②③④⑤⑦⑨", createdDate: "2026-03-28" },
  { id: 1013, title: "人生の大事件と家計管理", hook: "不妊治療、マイホーム購入、結婚式、ハネムーン。この4つが数年のうちに全部重なったら「全部は無理でしょ」って思いますよね。でも実際にこの4大イベントを全て叶えながら、年間60万円の貯蓄もできていた家庭があるんです。秘訣は時間軸の配置にあったんですが", hookCandidates: ["4つの夢全部実現、その代償は〇〇円だった", "不妊治療＋マイホーム＋結婚式の総額、親の私たちが学んだこと", "人生の大事件4つ、家計管理のプロが伝えたいメッセージ", "夢を諦めない家計戦略、その実例を初公開", "不妊治療の決断から結婚式まで、家計に学んだ教訓", "子どもを持つ親が直面する4大出費、我が家の乗り越え方", "マイホーム購入と不妊治療の同時期、その家計管理術", "人生の優先順位がお金で試される瞬間、私たちの選択"], body: "家計相談を受ける時に心が痛くなるのは「全部は無理ですよね」という決めつけを、ご自身がしてるケースです。人生の大事なイベントが次々来る時期、諦める必要はないんですよ。\n\n実際に相談した家庭があります。数年のうちに不妊治療、マイホーム購入、結婚式、ハネムーンの4大イベントが控えてました。\n\n戦略のポイントは「時間軸の最適配置」でした。\n\nまず不妊治療の時期を先行させることで、費用が確定する。その間にマイホーム購入に向けた貯蓄計画を立てる。不妊治療の金銭的ゴールが見えることで、その先の貯蓄ペースが明確になるんです。\n\n次にマイホーム購入のタイミングを工夫。繁忙期を避けて交渉余地のある時期に。この判断だけで数十万円浮きます。\n\n結婚式とハネムーンは規模と時期を調整。ご祝儀の確保、会社の慶弔費用や補助を最大活用しました。\n\nそして日々の家計管理で月々の貯蓄額を工夫。月5万円の余裕が年60万円。5年なら300万円。\n\n結果として4大イベントを全て実現させながら、貯蓄もできてました。「全部は無理」じゃなく「工夫次第で全部可能」だったんです。アイコンから他の家計戦略ものぞいてみてくださいね。", cat: "人生管理", status: "draft", scheduleDate: "", scheduleTime: "", priority: 19, source: "リライト", usedTemplate: "Hero's Journey型", valueCheck: "①②③④⑦⑧⑨", createdDate: "2026-03-28" },
];

function Badge({cat}){const c=CAT_COLORS[cat]||CAT_COLORS["その他"];return <span style={{background:c.bg,color:c.text,padding:"2px 10px",borderRadius:999,fontSize:11,fontWeight:600}}>{cat}</span>}

function CharCount({text,label,ideal}){const len=(text||"").length;const color=ideal?(len>=ideal[0]&&len<=ideal[1]?"#059669":len>0?"#D97706":"#9CA3AF"):"#6B7280";return <span style={{fontSize:11,color,fontWeight:500}}>{label} {len}文字{ideal&&<span style={{color:"#9CA3AF"}}> / {ideal[0]}-{ideal[1]}</span>}</span>}

function PriorityBadge({p}){if(p>3)return null;const styles={1:{bg:"#FEE2E2",text:"#DC2626",label:"今すぐ"},2:{bg:"#FEF3C7",text:"#D97706",label:"今週中"},3:{bg:"#DBEAFE",text:"#2563EB",label:"来週OK"}};const s=styles[p];return <span style={{background:s.bg,color:s.text,padding:"1px 8px",borderRadius:999,fontSize:10,fontWeight:700}}>{s.label}</span>}

function CopyBtn({text,label}){
  const[copied,setCopied]=useState(false);
  const handleCopy=()=>{if(!text)return;navigator.clipboard.writeText(text).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),1500)}).catch(()=>{const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);setCopied(true);setTimeout(()=>setCopied(false),1500)})};
  return <button onClick={handleCopy} style={{fontSize:10,color:copied?"#059669":"#6B7280",background:copied?"#D1FAE5":"#F3F4F6",border:"none",borderRadius:6,padding:"3px 8px",cursor:text?"pointer":"default",transition:"all 0.2s"}}>{copied?"コピー済み!":label||"コピー"}</button>
}

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>

          <div style={{display:"flex",gap:6,alignItems:"center"}}>

        {editing==="hook"?<textarea value={editVal} onChange={e=>setEditVal(e.target.value)} onBlur={()=>saveEdit("hook")} autoFocus rows={3} style={{width:"100%",fontSize:13,border:"1px solid #3B82F6",borderRadius:6,padding:8,outline:"none",resize:"vertical",fontFamily:"inherit",boxSizing:"border-box"}}/>:<p onClick={()=>post.status!=="done"&&startEdit("hook",post.hook)} style={{fontSize:13,color:"#374151",margin:0,cursor:post.status!=="done"?"pointer":"default",lineHeight:1.6,background:"#F9FAFB",padding:8,borderRadius:8,minHeight:36}}>{post.hook||<span style={{color:"#9CA3AF"}}>タップして入力...</span>}</p>}
      </div>
      {(post.body||editing==="body")?<div style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}><span style={{fontSize:11,color:"#6B7280",fontWeight:600}}>2投稿目（解説）</span><CharCount text={post.body} label="" ideal={[400,600]}/></div>{editing==="body"?<textarea value={editVal} onChange={e=>setEditVal(e.target.value)} onBlur={()=>saveEdit("body")} autoFocus rows={8} style={{width:"100%",fontSize:13,border:"1px solid #3B82F6",borderRadius:6,padding:8,outline:"none",resize:"vertical",fontFamily:"inherit",boxSizing:"border-box"}}/>:<p onClick={()=>post.status!=="done"&&startEdit("body",post.body)} style={{fontSize:12,color:"#4B5563",margin:0,cursor:post.status!=="done"?"pointer":"default",lineHeight:1.6,background:"#F9FAFB",padding:8,borderRadius:8,whiteSpace:"pre-wrap",maxHeight:120,overflow:"auto"}}>{post.body}</p>}</div>:post.status!=="done"&&<button onClick={()=>startEdit("body","")} style={{fontSize:11,color:"#3B82F6",background:"none",border:"none",cursor:"pointer",padding:0,marginBottom:8}}>+ 2投稿目を追加</button>}
      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",paddingTop:8,borderTop:"1px solid #F3F4F6"}}>

        {post.status==="scheduled"&&<><span style={{fontSize:12,color:"#92400E"}}>{post.scheduleDate} {post.scheduleTime}</span><button onClick={()=>onStatusChange(post.id,"draft")} style={{fontSize:11,color:"#6B7280",background:"#F3F4F6",border:"none",borderRadius:6,padding:"3px 8px",cursor:"pointer"}}>戻す</button><button onClick={()=>onStatusChange(post.id,"done")} style={{marginLeft:"auto",fontSize:12,fontWeight:600,color:"#fff",background:"#10B981",border:"none",borderRadius:8,padding:"5px 12px",cursor:"pointer"}}>投稿完了</button></>}
        {post.status==="done"&&<><span style={{fontSize:12,color:"#059669",fontWeight:600}}>{post.scheduleDate&&`${post.scheduleDate} 投稿済み`}</span><button onClick={()=>onStatusChange(post.id,"draft")} style={{marginLeft:"auto",fontSize:11,color:"#6B7280",background:"#F3F4F6",border:"none",borderRadius:6,padding:"3px 8px",cursor:"pointer"}}>下書きに戻す</button></>}
      </div>
    </div>
  );

function TokutenCard({item,onUpdate}){
  return(
    <div style={{background:"#fff",borderRadius:12,padding:16,marginBottom:10,boxShadow:"0 1px 3px rgba(0,0,0,0.06)",border:"1px solid #E5E7EB"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div><h3 style={{fontSize:14,fontWeight:700,margin:0}}>{item.name}</h3><span style={{fontSize:11,color:"#6B7280"}}>{item.type}</span></div>
        <span style={{fontSize:22,fontWeight:800,color:"#3B82F6"}}>{item.distributed}</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <button onClick={()=>{if(item.distributed>0){onUpdate(item.id,"distributed",item.distributed-1);onUpdate(item.id,"lastDate",new Date().toISOString().slice(0,10))}}} style={{fontSize:12,fontWeight:600,color:"#fff",background:item.distributed>0?"#EF4444":"#D1D5DB",border:"none",borderRadius:8,padding:"5px 12px",cursor:item.distributed>0?"pointer":"default"}}>-1</button>
        <button onClick={()=>{onUpdate(item.id,"distributed",item.distributed+1);onUpdate(item.id,"lastDate",new Date().toISOString().slice(0,10))}} style={{fontSize:12,fontWeight:600,color:"#fff",background:"#3B82F6",border:"none",borderRadius:8,padding:"5px 12px",cursor:"pointer"}}>+1 配布</button>
        {item.lastDate&&<span style={{fontSize:11,color:"#9CA3AF"}}>最終: {item.lastDate}</span>}
      </div>
    </div>
  );
}

function App(){
  const[posts,setPosts]=useState(INITIAL_POSTS);const[tokuten,setTokuten]=useState(INITIAL_TOKUTEN);const[tab,setTab]=useState("draft");const[catFilter,setCatFilter]=useState("all");const[showImport,setShowImport]=useState(false);const[importText,setImportText]=useState("");const[importMsg,setImportMsg]=useState("");
  const updatePost=(id,field,val)=>setPosts(prev=>prev.map(p=>p.id===id?{...p,[field]:val}:p));
  const changeStatus=(id,s)=>setPosts(prev=>prev.map(p=>p.id===id?{...p,status:s}:p));
  const updateTokuten=(id,field,val)=>setTokuten(prev=>prev.map(t=>t.id===id?{...t,[field]:val}:t));
  const handleImport=()=>{try{const data=JSON.parse(importText);const arr=Array.isArray(data)?data:[data];const maxId=Math.max(...posts.map(p=>p.id),0);const newPosts=arr.map((item,i)=>({id:maxId+i+1,title:item.title||"",hook:item.hook||"",hookCandidates:item.hookCandidates||[],body:item.body||"",cat:item.cat||"その他",status:"draft",scheduleDate:"",scheduleTime:"",priority:item.priority||5,source:item.source||"",usedTemplate:item.usedTemplate||"",valueCheck:item.valueCheck||"",createdDate:item.createdDate||new Date().toISOString().slice(0,10)}));setPosts(prev=>[...prev,...newPosts]);setImportMsg(newPosts.length+"件インポートしました");setImportText("");setTimeout(()=>{setShowImport(false);setImportMsg("")},1500)}catch(e){setImportMsg("JSONの形式が正しくありません")}};
  const handleExport=()=>{const data=JSON.stringify(posts,null,2);const blob=new Blob([data],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="threads_posts_backup_"+new Date().toISOString().slice(0,10)+".json";a.click();URL.revokeObjectURL(url)};
  const filtered=posts.filter(p=>p.status===tab).filter(p=>catFilter==="all"||p.cat===catFilter).sort((a,b)=>(a.priority||99)-(b.priority||99));
  const counts={draft:posts.filter(p=>p.status==="draft").length,scheduled:posts.filter(p=>p.status==="scheduled").length,done:posts.filter(p=>p.status==="done").length,tokuten:tokuten.length};
  const cats=[...new Set(posts.filter(p=>p.status===tab).map(p=>p.cat))];
  const totalDistributed=tokuten.reduce((s,t)=>s+t.distributed,0);
  return(
    <div style={{maxWidth:540,margin:"0 auto",padding:"12px 10px",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",background:"#F9FAFB",minHeight:"100vh"}}>
      <div style={{textAlign:"center",marginBottom:16,position:"relative"}}>
        <h1 style={{fontSize:18,fontWeight:800,margin:"0 0 2px",color:"#111827"}}>Threads 投稿マネージャー</h1>
        <p style={{fontSize:12,color:"#6B7280",margin:0}}>ぽん | 家計管理FPママ</p>
        <div style={{position:"absolute",right:0,top:4,display:"flex",gap:4}}>
          <button onClick={handleExport} style={{fontSize:10,color:"#6B7280",background:"#F3F4F6",border:"none",borderRadius:6,padding:"4px 8px",cursor:"pointer"}}>保存</button>
          <button onClick={()=>setShowImport(true)} style={{fontSize:11,fontWeight:700,color:"#fff",background:"#3B82F6",border:"none",borderRadius:8,padding:"5px 10px",cursor:"pointer"}}>+ インポート</button>
        </div>
      </div>
      {showImport&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:16}}><div style={{background:"#fff",borderRadius:16,padding:20,width:"100%",maxWidth:480,maxHeight:"80vh",overflow:"auto"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><h2 style={{fontSize:16,fontWeight:700,margin:0}}>投稿データをインポート</h2><button onClick={()=>{setShowImport(false);setImportMsg("")}} style={{fontSize:18,color:"#6B7280",background:"none",border:"none",cursor:"pointer"}}>x</button></div><p style={{fontSize:12,color:"#6B7280",margin:"0 0 10px"}}>ポスターが生成したJSONの中身をペースト</p><textarea value={importText} onChange={e=>setImportText(e.target.value)} placeholder='[{"title":"...", "hook":"...", "body":"...", "cat":"固定費", "priority":1}]' rows={10} style={{width:"100%",fontSize:12,border:"1px solid #D1D5DB",borderRadius:8,padding:10,fontFamily:"monospace",resize:"vertical",boxSizing:"border-box"}}/>{importMsg&&<p style={{fontSize:12,color:importMsg.includes("しました")?"#059669":"#DC2626",margin:"8px 0 0",fontWeight:600}}>{importMsg}</p>}<div style={{display:"flex",gap:8,marginTop:12}}><button onClick={handleImport} disabled={!importText.trim()} style={{flex:1,fontSize:13,fontWeight:700,color:"#fff",background:importText.trim()?"#3B82F6":"#D1D5DB",border:"none",borderRadius:10,padding:"10px 0",cursor:importText.trim()?"pointer":"default"}}>インポート実行</button><button onClick={()=>{setShowImport(false);setImportMsg("")}} style={{fontSize:13,color:"#6B7280",background:"#F3F4F6",border:"none",borderRadius:10,padding:"10px 16px",cursor:"pointer"}}>キャンセル</button></div></div></div>}
      <div style={{display:"flex",gap:3,marginBottom:14,background:"#E5E7EB",borderRadius:10,padding:3}}>{TABS.map(t=><button key={t.key} onClick={()=>{setTab(t.key);setCatFilter("all")}} style={{flex:1,fontSize:12,fontWeight:tab===t.key?700:500,color:tab===t.key?"#111827":"#6B7280",background:tab===t.key?"#fff":"transparent",border:"none",borderRadius:8,padding:"7px 0",cursor:"pointer"}}>{t.label} ({counts[t.key]})</button>)}</div>
      {tab==="tokuten"?<><div style={{background:"#EFF6FF",borderRadius:10,padding:12,marginBottom:12,textAlign:"center"}}><span style={{fontSize:12,color:"#1E40AF"}}>累計配布数</span><div style={{fontSize:28,fontWeight:800,color:"#1E40AF"}}>{totalDistributed}</div></div>{tokuten.map(t=><TokutenCard key={t.id} item={t} onUpdate={updateTokuten}/>)}</>:<>
        {tab==="draft"&&cats.length>1&&<div style={{display:"flex",gap:4,marginBottom:12,flexWrap:"wrap"}}><button onClick={()=>setCatFilter("all")} style={{fontSize:10,fontWeight:catFilter==="all"?700:400,color:catFilter==="all"?"#1E40AF":"#6B7280",background:catFilter==="all"?"#DBEAFE":"#F3F4F6",border:"none",borderRadius:999,padding:"2px 8px",cursor:"pointer"}}>すべて</button>{cats.map(c=><button key={c} onClick={()=>setCatFilter(c)} style={{fontSize:10,fontWeight:catFilter===c?700:400,color:(CAT_COLORS[c]||CAT_COLORS["その他"]).text,background:catFilter===c?(CAT_COLORS[c]||CAT_COLORS["その他"]).bg:"#F3F4F6",border:"none",borderRadius:999,padding:"2px 8px",cursor:"pointer"}}>{c}</button>)}</div>}
        {tab==="draft"&&filtered.length>0&&<div style={{background:"#FFFBEB",borderRadius:8,padding:"6px 10px",marginBottom:10,fontSize:11,color:"#92400E"}}>優先度順に表示中（「今すぐ」→「今週中」→「来週OK」→その他）</div>}
        {filtered.length===0?<div style={{textAlign:"center",padding:40,color:"#9CA3AF"}}><p style={{fontSize:14}}>{tab==="draft"?"下書きはありません":tab==="scheduled"?"予約投稿はありません":"投稿済みはまだありません"}</p></div>:filtered.map(p=><PostCard key={p.id} post={p} onUpdate={updatePost} onStatusChange={changeStatus}/>)}
      </>}
      <div style={{textAlign:"center",padding:"16px 0 30px",fontSize:10,color:"#9CA3AF"}}>投稿{posts.length}件 | 下書き{counts.draft} | 予約{counts.scheduled} | 済{counts.done} | 特典{tokuten.length}種</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
